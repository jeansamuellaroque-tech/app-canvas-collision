<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulación de Círculos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">

  <!-- TU CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">⚡ Canvas Physics Lab</a>
    <span class="text-light small">Simulación en Tiempo Real</span>
  </div>
</nav>

<!-- TITULO -->
<div class="container text-center mt-4">
  <h1>Simulación de Círculos</h1>
  <p>Movimiento, colisión y rebote en tiempo real</p>
</div>

<!-- CONTROL -->
<div class="container text-center my-4">
  <label class="form-label">Cantidad de círculos</label>
  <input type="range" class="form-range w-50 mx-auto" id="cantidad" min="1" max="20" value="8">
  <h2 id="valor">8</h2>
</div>

<!-- 🔥 GRID BOOTSTRAP -->
<div class="container">
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card glass text-center p-3">
        <h5>Movimiento</h5>
        <canvas id="canvas1"></canvas>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card glass text-center p-3">
        <h5>Colisiones</h5>
        <canvas id="canvas2"></canvas>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card glass text-center p-3">
        <h5>Rebote</h5>
        <canvas id="canvas3"></canvas>
      </div>
    </div>

  </div>
</div>

<!-- 🔥 FOOTER -->
<footer class="mt-5 py-3 glass text-center">
  <p class="mb-1"><strong>Jean Samuel Laroque</strong></p>
  <p class="mb-0 small">Ingeniería en Sistemas • Programación Web • 2026</p>
</footer>

<!-- JS -->
<script src="assets/js/main.js"></script>
<script src="assets/js/main_colision.js"></script>
<script src="assets/js/main_rebote.js"></script>

<!-- SLIDER -->
<script>
const slider = document.getElementById("cantidad");
const valor = document.getElementById("valor");

valor.textContent = slider.value;

slider.addEventListener("input", () => {
  const n = parseInt(slider.value);
  valor.textContent = n;

  window.cantidadCirculos = n;

  createCircles1(n);
  createCircles2(n);
  createCircles3(n);
});
</script>

</body>
</html>
