<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulación de Círculos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS externo -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <h1>Simulación de Círculos</h1>
  <p>Simulador visual de movimiento, colisión y rebote</p>

  <!-- Control -->
  <div class="control">
    <label>Cantidad de círculos:</label>
    <input type="range" id="cantidad" min="1" max="20" value="8">
    <h2 id="valor">8</h2>
  </div>

  <!-- SIMULACIONES -->
  <div class="contenedor-simulaciones">

    <div class="card">
      <h3>Simulación 1</h3>
      <p>Círculos en movimiento</p>
      <canvas id="canvas1"></canvas>
    </div>

    <div class="card">
      <h3>Simulación 2</h3>
      <p>Colisiones</p>
      <canvas id="canvas2"></canvas>
    </div>

    <div class="card">
      <h3>Simulación 3</h3>
      <p>Rebote</p>
      <canvas id="canvas3"></canvas>
    </div>

  </div>

  <!-- JS -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/main_colision.js"></script>
  <script src="assets/js/main_rebote.js"></script>

  <!-- Slider -->
  <script>
    const slider = document.getElementById("cantidad");
    const valor = document.getElementById("valor");

    valor.textContent = slider.value;

    slider.addEventListener("input", () => {
      valor.textContent = slider.value;
      window.cantidadCirculos = parseInt(slider.value);
    });
  </script>

</body>
</html>
